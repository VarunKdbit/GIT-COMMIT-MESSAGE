<!DOCTYPE html>
<html>
<head>
<title>AI Commit Generator</title>
<style>
body{background:#0a0a0f;color:white;font-family:monospace;padding:40px}
textarea{width:100%;height:220px;background:#111;border:1px solid #444;color:white;padding:10px}
button{padding:12px 20px;margin-top:10px;background:#7c6aff;color:white;border:none}
pre{background:#111;padding:20px;margin-top:20px}
</style>
</head>
<body>

<h1>⚡ AI Git Commit Generator</h1>

<textarea id="diffInput" placeholder="Paste git diff here..."></textarea>
<br>
<button onclick="generateCommit()">Generate Commit</button>

<pre id="output"></pre>

<script>
async function generateCommit(){
    const diff = document.getElementById("diffInput").value.trim();
    if(!diff){ alert("Paste diff first"); return; }

    const res = await fetch("/generate-commit",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ diff })
    });

    const data = await res.json();
    document.getElementById("output").textContent =
        data.success ? data.message : data.error;
}
</script>

</body>
</html>
